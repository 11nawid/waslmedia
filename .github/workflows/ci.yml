name: CI

on:
  push:
    branches:
      - main
      - codex/public-main
  pull_request:

jobs:
  app-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: waslmedia
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: waslmedia/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck
