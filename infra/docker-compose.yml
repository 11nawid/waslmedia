services:
  app:
    build:
      context: ../waslmedia
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_APP_BASE_URL: "${APP_PUBLIC_URL:-https://waslmedia.com}"
        NEXT_PUBLIC_TURNSTILE_SITE_KEY: "${NEXT_PUBLIC_TURNSTILE_SITE_KEY:-}"
    container_name: waslmedia_app
    restart: unless-stopped
    env_file:
      - .env
      - ../waslmedia/.env
      - ../waslmedia/.env.local
    environment:
      NODE_ENV: production
      PORT: "3000"
      APP_ENV_MODE: production
      APP_BASE_URL: "${APP_PUBLIC_URL:-https://waslmedia.com}"
      NEXT_PUBLIC_APP_BASE_URL: "${APP_PUBLIC_URL:-https://waslmedia.com}"
      STORAGE_ENDPOINT: "http://minio:9000"
      STORAGE_PUBLIC_URL: "http://minio:9000"
      REDIS_URL: "redis://redis:6379"
      DB_HOST: "${DOCKER_DB_HOST:-host.docker.internal}"
      RAZORPAY_WEBHOOK_URL: "${RAZORPAY_WEBHOOK_URL:-https://waslmedia.com/api/payments/razorpay/webhook}"
    ports:
      - "${APP_PORT:-3000}:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      minio:
        condition: service_started
      redis:
        condition: service_started

  worker:
    build:
      context: ../waslmedia
      dockerfile: Dockerfile.dev
    container_name: waslmedia_worker
    restart: unless-stopped
    working_dir: /app
    command: npm run worker:video-processing
    env_file:
      - .env
      - ../waslmedia/.env
      - ../waslmedia/.env.local
    environment:
      NODE_ENV: development
      APP_ENV_MODE: production
      APP_BASE_URL: "${APP_PUBLIC_URL:-https://waslmedia.com}"
      NEXT_PUBLIC_APP_BASE_URL: "${APP_PUBLIC_URL:-https://waslmedia.com}"
      STORAGE_ENDPOINT: "http://minio:9000"
      STORAGE_PUBLIC_URL: "http://minio:9000"
      REDIS_URL: "redis://redis:6379"
      DB_HOST: "${DOCKER_DB_HOST:-host.docker.internal}"
      RAZORPAY_WEBHOOK_URL: "${RAZORPAY_WEBHOOK_URL:-https://waslmedia.com/api/payments/razorpay/webhook}"
    volumes:
      - ../waslmedia:/app
      - waslmedia_node_modules:/app/node_modules
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      minio:
        condition: service_started
      redis:
        condition: service_started

  redis:
    image: redis:7-alpine
    container_name: waslmedia_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"

  minio:
    image: minio/minio:latest
    container_name: waslmedia_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    env_file:
      - .env
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
  createbuckets:
    image: minio/mc:latest
    container_name: waslmedia_minio_init
    env_file:
      - .env
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD; do sleep 2; done &&
      mc mb --ignore-existing local/profile &&
      mc mb --ignore-existing local/banners &&
      mc mb --ignore-existing local/videos &&
      mc mb --ignore-existing local/thumbnails &&
      mc mb --ignore-existing local/postimages &&
      mc mb --ignore-existing local/freeaudio &&
      mc mb --ignore-existing local/feedback &&
      mc anonymous set none local/profile &&
      mc anonymous set none local/banners &&
      mc anonymous set none local/videos &&
      mc anonymous set none local/thumbnails &&
      mc anonymous set none local/postimages &&
      mc anonymous set none local/freeaudio &&
      mc anonymous set none local/feedback
      "
    restart: "no"

volumes:
  minio_data:
  waslmedia_node_modules:
